<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bicicletas</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="shortcut icon" href="./assets/web-ico.svg" type="image/x-icon">


    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        .font-poppins {
            font-family: "Poppins", sans-serif;
        }

        #cart-dialog[open] {
            animation: progress 1s ease-in-out forwards;
        }

        @keyframes progress {
            0% {
                opacity: 0;
                transform: translateY(100%);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>


</head>

<body class="font-poppins">

    <!--Navegación -->
    <nav id="nav"
        class="lg:fixed w-full top-0 flex flex-wrap justify-between rounded-b-sm items-center py-5 px-5 bg-white">

        <div class="hidden md:block w-40 h-40 rounded-full shrink-0 grow-0 overflow-hidden ">
            <img class="w-full h-full object-cover" src="./assets/logo.jpg" alt="logo tienda" />
        </div>

        <h1 class="text-center text-6xl text-orange-400 font-bold">Bike</h1>

        <!--Menú escritorio -->
        <div id="left-arrow" class="ml-3 lg:hidden">
            <img class="w-[40px] h-[40px]" src="assets/arrow-left.svg" alt="arrow-right">
        </div>
        <ul class="hidden lg:flex flex-wrap gap-2">
            <li class="p-2 rounded-sm hover:bg-blue-500 hover:*:text-white"><a class="text-xl font-bold text-orange-400"
                    href="index.html">Inicio</a></li>
            <li class="p-2 rounded-sm hover:bg-blue-500 hover:*:text-white"><a class="text-xl font-bold text-orange-400"
                    href="about.html">Acerca de</a></li>
            <li class="p-2 rounded-sm hover:bg-blue-500 hover:*:text-white"><a class="text-xl font-bold text-orange-400"
                    href="contact.html">Contacto</a></li>
        </ul>

        <!--Menú hamburguesa -->
        <div id="b-menu" 
            class="opacity-0 pointer-events-none transition-opacity duration-300 absolute top-0 left-0  w-full h-screen lg:hidden grid grid-cols-2">
            <div class="backdrop-blur-[2px] bg-black/50"></div>
            <div id="col-right" class="z-1 h-full bg-white">
                <div id="right-arrow" class="ml-4 mt-8">
                    <img class="w-[50px] h-[50px]" src="assets/arrow-right.svg" alt="arrow-right">
                </div>
                <ul class="flex flex-col text-end justify-end flex-wrap">
                    <li class="px-2 py-5 border-b-1 border-t-2 border-gray-200"><a
                            class="text-xl font-bold text-orange-400" href="index.html">Inicio</a></li>
                    <li class="px-2 py-5 "><a class="text-xl font-bold text-orange-400" href="about.html">Acerca de</a>
                    </li>
                    <li class="px-2 py-5 border-b-1 border-t-2 border-gray-200"><a
                            class="text-xl font-bold text-orange-400" href="contact.html">Contacto</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main id="details-main-section" class="mt-10 relative lg:mt-50">

    </main>

    <!--Footer-->
    <footer class="bg-orange-400">
        <section class="flex py-5 justify-center gap-6">
            <a class="w-10 h-10" href="https://wa.me/34679377876">
                <img class="object-cover" src="assets/whatsapp.png" alt="whatsapp">
            </a>
            <a class="w-10 h-10" href="https://instagram.com">
                <img src="assets/instagram.png" alt="instagram">
            </a>
            <a class="w-10 h-10" href="mail:marcomorenilla@gmail.com">
                <img src="assets/gmail.png" alt="gmail">
            </a>
        </section>
        <section class="pb-1 flex justify-center gap-4">
            <p class="text-center">© Todos los derechos reservados</p>
            <a class="underline text-blue-500" href="privacidad.html">Política de privacidad</a>
        </section>
    </footer>

    <dialog id="cart-dialog" class="fixed" >
        <div class="absolute top-10 right-10 bg-white md:w-lg p-5 flex flex-col justify-center gap-4">
            <h2 class="text-green-500 p-3 font-bold text-center text-2xl">
                Carrito actualizado
            </h2>
        </div>
    </dialog>

    <script src="js/index.js"></script>
    <script type="module" src="js/detailsHandler.js"></script>



</body>

</html>
